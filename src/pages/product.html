<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Mashallah Furniture</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="product-page">
        <div class="container">
            <div class="breadcrumb">
                <a href="/">Home</a> /
                <a href="/shop.html">Shop</a> /
                <span id="product-name">Product Details</span>

            <div class="product-detail" id="product-detail">
                <!-- Loading spinner -->
                <div class="loading-spinner">Loading...</div>

            <div class="related-products">
                <h3>Related Products</h3>
                <div class="products-grid" id="related-products"></div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <div id="cart-sidebar"></div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>

    </nav>

    <!-- Product Details -->
    <main class="container">
        <div id="productContainer" class="product-detail">
            <!-- Loading state -->
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Loading product details...</p>
            </div>

            <!-- Error state -->
            <div id="errorState" class="error-state" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Product Not Found</h2>
                <p>The product you're looking for doesn't exist or has been removed.</p>
                <a href="/shop.html" class="btn btn-primary">Back to Shop</a>
            </div>

            <!-- Product content will be inserted here -->
        </div>

        <!-- Related Products -->
        <section id="relatedProducts" class="related-products" style="display: none;">
            <h2>Related Products</h2>
            <div id="relatedProductsGrid" class="products-grid">
                <!-- Related products will be inserted here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer style="background: #333; color: white; padding: 40px 0; margin-top: 60px;">
        <div class="container" style="text-align: center;">
            <p>&copy; 2024 Mashallah Furniture. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module">
        import dataService from '/src/js/services/dataService.js';

        class ProductDetailPage {
            constructor() {
                this.productId = this.getProductIdFromUrl();
                this.product = null;
                this.relatedProducts = [];
                this.init();
            }

            init() {
                if (!this.productId) {
                    this.showError();
                    return;
                }

                this.loadProduct();
                this.setupEventListeners();
            }

            getProductIdFromUrl() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id');
            }

            async loadProduct() {
                try {
                    this.showLoading();

                    // Load product data
                    this.product = await dataService.getProductById(this.productId);

                    if (!this.product) {
                        this.showError();
                        return;
                    }

                    // Load related products
                    await this.loadRelatedProducts();

                    // Render product
                    this.renderProduct();
                    this.renderRelatedProducts();

                    // Update page title and meta tags
                    this.updatePageMeta();

                    // Track product view
                    this.trackProductView();

                } catch (error) {
                    console.error('Error loading product:', error);
                    this.showError();
                } finally {
                    this.hideLoading();
                }
            }

            async loadRelatedProducts() {
                try {
                    const allProducts = await dataService.getProducts();
                    this.relatedProducts = allProducts
                        .filter(p => p.id !== this.product.id && p.category === this.product.category)
                        .slice(0, 4);
                } catch (error) {
                    console.error('Error loading related products:', error);
                }
            }

            renderProduct() {
                const container = document.getElementById('productContainer');

                const productHtml = `
                    <div class="product-detail-content">
                        <!-- Product Images -->
                        <div class="product-images">
                            <div class="main-image">
                                <img id="mainProductImage" src="${this.getProductImage(this.product, 0)}"
                                     alt="${this.product.name}" class="product-image">
                            </div>
                            ${this.getProductImages(this.product).length > 1 ? `
                                <div class="thumbnail-images">
                                    ${this.getProductImages(this.product).map((image, index) => `
                                        <img src="${this.getImageUrl(image)}" alt="${this.product.name} ${index + 1}"
                                             class="thumbnail ${index === 0 ? 'active' : ''}"
                                             data-index="${index}">
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <!-- Product Info -->
                        <div class="product-info">
                            <h1 class="product-title">${this.product.name}</h1>

                            <div class="product-meta">
                                <div class="product-category">Category: ${this.product.category || 'Uncategorized'}</div>
                                <div class="product-rating">
                                    ${this.renderStars(this.product.rating || 0)}
                                    <span>(${this.product.reviews || 0} reviews)</span>
                                </div>
                            </div>

                            <div class="product-price">
                                <span class="current-price">$${this.product.price}</span>
                                ${this.product.originalPrice ? `<span class="original-price">$${this.product.originalPrice}</span>` : ''}
                            </div>

                            <div class="product-description">
                                <h3>Description</h3>
                                <p>${this.product.description || 'No description available.'}</p>
                            </div>

                            ${this.product.features?.length ? `
                                <div class="product-features">
                                    <h3>Features</h3>
                                    <ul>
                                        ${this.product.features.map(feature => `<li>${feature}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}

                            ${this.product.dimensions ? `
                                <div class="product-dimensions">
                                    <h3>Dimensions</h3>
                                    <p>${this.product.dimensions}</p>
                                </div>
                            ` : ''}

                            ${this.product.material ? `
                                <div class="product-material">
                                    <h3>Material</h3>
                                    <p>${this.product.material}</p>
                                </div>
                            ` : ''}

                            <!-- Stock Status -->
                            <div class="stock-status ${this.product.inStock !== false ? 'in-stock' : 'out-of-stock'}">
                                ${this.product.inStock !== false ? 'In Stock' : 'Out of Stock'}
                                ${this.product.stock ? ` (${this.product.stock} available)` : ''}
                            </div>

                            <!-- Add to Cart -->
                            <div class="product-actions">
                                <div class="quantity-selector">
                                    <button id="decreaseQty" class="qty-btn">-</button>
                                    <input type="number" id="productQty" value="1" min="1" max="${this.product.stock || 99}">
                                    <button id="increaseQty" class="qty-btn">+</button>
                                </div>

                                <button id="addToCartBtn" class="btn btn-primary add-to-cart-btn"
                                        ${this.product.inStock === false ? 'disabled' : ''}>
                                    <i class="fas fa-shopping-cart"></i>
                                    ${this.product.inStock === false ? 'Out of Stock' : 'Add to Cart'}
                                </button>

                                <button id="addToWishlistBtn" class="btn btn-secondary wishlist-btn">
                                    <i class="fas fa-heart"></i>
                                    Add to Wishlist
                                </button>
                            </div>

                            <!-- Share -->
                            <div class="product-share">
                                <h3>Share this product</h3>
                                <div class="share-buttons">
                                    <button class="share-btn" data-platform="facebook">
                                        <i class="fab fa-facebook-f"></i>
                                    </button>
                                    <button class="share-btn" data-platform="twitter">
                                        <i class="fab fa-twitter"></i>
                                    </button>
                                    <button class="share-btn" data-platform="pinterest">
                                        <i class="fab fa-pinterest"></i>
                                    </button>
                                    <button class="share-btn" data-platform="copy">
                                        <i class="fas fa-link"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                container.innerHTML = productHtml;
                this.setupProductEventListeners();
            }

            renderStars(rating) {
                const fullStars = Math.floor(rating);
                const hasHalfStar = rating % 1 !== 0;
                const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);

                return `
                    ${'<i class="fas fa-star"></i>'.repeat(fullStars)}
                    ${hasHalfStar ? '<i class="fas fa-star-half-alt"></i>' : ''}
                    ${'<i class="far fa-star"></i>'.repeat(emptyStars)}
                `;
            }

            renderRelatedProducts() {
                if (this.relatedProducts.length === 0) return;

                const container = document.getElementById('relatedProductsGrid');

                const relatedHtml = this.relatedProducts.map(product => `
                    <div class="product-card" data-id="${product.id}">
                        <div class="product-img">
                            <img src="${this.getProductImage(product, 0)}" alt="${product.name}">
                            <div class="product-actions">
                                <button class="action-btn quick-view-btn" data-id="${product.id}">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn wishlist-btn ${dataService.isInWishlist(product.id) ? 'active' : ''}" data-id="${product.id}">
                                    <i class="fas fa-heart"></i>
                                </button>
                                <button class="action-btn add-cart-btn" data-id="${product.id}">
                                    <i class="fas fa-shopping-cart"></i>
                                </button>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <div class="product-price">
                                <span class="current-price">$${product.price}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = relatedHtml;
                document.getElementById('relatedProducts').style.display = 'block';

                // Add event listeners for related products
                this.setupRelatedProductListeners();
            }

            setupEventListeners() {
                // Update cart and wishlist counts on load
                this.updateCounts();
            }

            setupProductEventListeners() {
                // Image gallery
                document.querySelectorAll('.thumbnail').forEach(thumb => {
                    thumb.addEventListener('click', (e) => {
                        const index = e.target.dataset.index;
                        this.changeMainImage(index);
                    });
                });

                // Quantity controls
                document.getElementById('decreaseQty').addEventListener('click', () => {
                    this.adjustQuantity(-1);
                });

                document.getElementById('increaseQty').addEventListener('click', () => {
                    this.adjustQuantity(1);
                });

                document.getElementById('productQty').addEventListener('change', (e) => {
                    this.validateQuantity(e.target.value);
                });

                // Add to cart
                document.getElementById('addToCartBtn').addEventListener('click', () => {
                    this.addToCart();
                });

                // Add to wishlist
                document.getElementById('addToWishlistBtn').addEventListener('click', () => {
                    this.toggleWishlist();
                });

                // Share buttons
                document.querySelectorAll('.share-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.shareProduct(e.target.dataset.platform);
                    });
                });
            }

            setupRelatedProductListeners() {
                document.querySelectorAll('#relatedProductsGrid .add-cart-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const productId = e.target.closest('.product-card').dataset.id;
                        this.addRelatedToCart(productId);
                    });
                });

                document.querySelectorAll('#relatedProductsGrid .wishlist-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const productId = e.target.closest('.product-card').dataset.id;
                        this.toggleRelatedWishlist(productId);
                    });
                });

                document.querySelectorAll('#relatedProductsGrid .quick-view-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const productId = e.target.closest('.product-card').dataset.id;
                        window.location.href = `/product.html?id=${productId}`;
                    });
                });
            }

            changeMainImage(index) {
                const thumbnails = document.querySelectorAll('.thumbnail');
                const mainImage = document.getElementById('mainProductImage');

                thumbnails.forEach(thumb => thumb.classList.remove('active'));
                thumbnails[index].classList.add('active');

                const images = this.getProductImages(this.product);
                mainImage.src = this.getImageUrl(images[index]);
            }

            adjustQuantity(delta) {
                const qtyInput = document.getElementById('productQty');
                const newQty = Math.max(1, parseInt(qtyInput.value) + delta);
                qtyInput.value = newQty;
            }

            validateQuantity(value) {
                const qty = parseInt(value);
                const maxStock = this.product.stock || 99;
                if (qty < 1) {
                    document.getElementById('productQty').value = 1;
                } else if (qty > maxStock) {
                    document.getElementById('productQty').value = maxStock;
                }
            }

            async addToCart() {
                const quantity = parseInt(document.getElementById('productQty').value);

                try {
                    dataService.addToCart(this.product, quantity);
                    this.showToast(`Added ${quantity}x ${this.product.name} to cart!`, 'success');
                    this.updateCounts();
                } catch (error) {
                    console.error('Error adding to cart:', error);
                    this.showToast('Error adding item to cart', 'error');
                }
            }

            async toggleWishlist() {
                const isInWishlist = dataService.isInWishlist(this.product.id);

                try {
                    if (isInWishlist) {
                        dataService.removeFromWishlist(this.product.id);
                        this.showToast(`Removed ${this.product.name} from wishlist`, 'info');
                    } else {
                        dataService.addToWishlist(this.product);
                        this.showToast(`Added ${this.product.name} to wishlist!`, 'success');
                    }

                    this.updateWishlistButton();
                    this.updateCounts();
                } catch (error) {
                    console.error('Error updating wishlist:', error);
                    this.showToast('Error updating wishlist', 'error');
                }
            }

            async addRelatedToCart(productId) {
                try {
                    const product = this.relatedProducts.find(p => p.id == productId);
                    if (product) {
                        dataService.addToCart(product, 1);
                        this.showToast(`Added ${product.name} to cart!`, 'success');
                        this.updateCounts();
                    }
                } catch (error) {
                    console.error('Error adding related product to cart:', error);
                }
            }

            async toggleRelatedWishlist(productId) {
                try {
                    const product = this.relatedProducts.find(p => p.id == productId);
                    if (!product) return;

                    const isInWishlist = dataService.isInWishlist(productId);

                    if (isInWishlist) {
                        dataService.removeFromWishlist(productId);
                        this.showToast(`Removed ${product.name} from wishlist`, 'info');
                    } else {
                        dataService.addToWishlist(product);
                        this.showToast(`Added ${product.name} to wishlist!`, 'success');
                    }

                    this.updateCounts();
                } catch (error) {
                    console.error('Error updating related product wishlist:', error);
                }
            }

            updateWishlistButton() {
                const btn = document.getElementById('addToWishlistBtn');
                const isInWishlist = dataService.isInWishlist(this.product.id);

                btn.innerHTML = `<i class="fas fa-heart"></i> ${isInWishlist ? 'Remove from' : 'Add to'} Wishlist`;
                btn.classList.toggle('active', isInWishlist);
            }

            updateCounts() {
                const cart = dataService.getCart();
                const wishlist = dataService.getWishlist();

                document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
                document.getElementById('wishlistCount').textContent = wishlist.length;
            }

            shareProduct(platform) {
                const url = window.location.href;
                const title = this.product.name;
                const text = `Check out this ${this.product.name} from Mashallah Furniture!`;

                switch (platform) {
                    case 'facebook':
                        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`);
                        break;
                    case 'twitter':
                        window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
                        break;
                    case 'pinterest':
                        const imageUrl = this.getProductImage(this.product, 0);
                        window.open(`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(url)}&media=${encodeURIComponent(imageUrl)}&description=${encodeURIComponent(text)}`);
                        break;
                    case 'copy':
                        navigator.clipboard.writeText(url).then(() => {
                            this.showToast('Link copied to clipboard!', 'success');
                        });
                        break;
                }
            }

            updatePageMeta() {
                // Update page title
                document.title = `${this.product.name} | Mashallah Furniture`;

                // Update meta tags
                const metaTitle = document.querySelector('meta[property="og:title"]');
                const metaDescription = document.querySelector('meta[property="og:description"]');
                const metaImage = document.querySelector('meta[property="og:image"]');

                if (metaTitle) metaTitle.content = `${this.product.name} | Mashallah Furniture`;
                if (metaDescription) metaDescription.content = this.product.description || `Shop ${this.product.name} at Mashallah Furniture`;
                if (metaImage && this.getProductImages(this.product).length > 0) metaImage.content = this.getProductImage(this.product, 0);

                // Update breadcrumb
                document.getElementById('productName').textContent = this.product.name;
            }

            trackProductView() {
                // Track in Google Analytics
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'view_item', {
                        items: [{
                            item_id: this.product.id,
                            item_name: this.product.name,
                            category: this.product.category,
                            price: this.product.price
                        }]
                    });
                }

                // Add to recently viewed (you can implement this in dataService)
                const recentlyViewed = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
                const filtered = recentlyViewed.filter(id => id !== this.product.id);
                filtered.unshift(this.product.id);
                localStorage.setItem('recentlyViewed', JSON.stringify(filtered.slice(0, 10)));
            }

            getProductImages(product) {
                // Handle both formats: single image string or images array
                if (product.images && Array.isArray(product.images)) {
                    return product.images;
                } else if (product.image) {
                    // Convert single image to array format
                    return [{ url: product.image }];
                }
                return [{ url: '/assets/images/placeholder.jpg' }];
            }

            getImageUrl(image) {
                // Handle both string URLs and object with url property
                return typeof image === 'string' ? image : image.url || '/assets/images/placeholder.jpg';
            }

            getProductImage(product, index = 0) {
                const images = this.getProductImages(product);
                return this.getImageUrl(images[index] || images[0]);
            }

            showLoading() {
                document.getElementById('loadingState').style.display = 'block';
                document.getElementById('errorState').style.display = 'none';
            }

            hideLoading() {
                document.getElementById('loadingState').style.display = 'none';
            }

            showError() {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            }

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8'};
                    color: white;
                    padding: 15px 20px;
                    border-radius: 5px;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                    z-index: 1000;
                    font-weight: 500;
                    max-width: 300px;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            new ProductDetailPage();
        });

        // Add slideOut animation

                to { transform: translateX(100%); opacity: 0; }
            }

                padding: 60px 20px;

                animation: spin 1s linear infinite;

            }

                100% { transform: rotate(360deg); }
            }

                padding: 40px 0;

            .main-image {
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }

            .product-image {
                width: 100%;
                height: 500px;
                object-fit: cover;
            }

            .thumbnail-images {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .thumbnail {
                width: 80px;
                height: 80px;
                object-fit: cover;
                border-radius: 4px;
                cursor: pointer;
                border: 2px solid transparent;
                transition: border-color 0.3s ease;
            }

            .thumbnail.active {
                border-color: #8B4513;
            }

            .product-info h1 {
                font-size: 2.5rem;
                margin-bottom: 20px;
                color: #333;
            }

            .product-meta {
                margin-bottom: 20px;
            }

            .product-category {
                color: #666;
                margin-bottom: 10px;
            }

            .product-rating {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 10px;
            }

            .product-price {
                font-size: 2rem;
                font-weight: bold;
                color: #8B4513;
                margin-bottom: 30px;
            }

            .original-price {
                text-decoration: line-through;
                color: #999;
                font-size: 1.5rem;
                margin-left: 15px;
            }

            .product-description,
            .product-features,
            .product-dimensions,
            .product-material {
                margin-bottom: 30px;
            }

            .product-description h3,
            .product-features h3,
            .product-dimensions h3,
            .product-material h3 {
                font-size: 1.2rem;
                margin-bottom: 10px;
                color: #333;
            }

            .product-features ul {
                list-style: none;
                padding: 0;
            }

            .product-features li {
                padding: 5px 0;
                position: relative;
                padding-left: 20px;
            }

            .product-features li:before {
                content: "✓";

                font-weight: bold;

                padding: 10px 15px;
                border-radius: 4px;

                margin-bottom: 30px;
                display: inline-block;
            }

            .in-stock {
                background: #d4edda;
                color: #155724;
            }

            .out-of-stock {
                background: #f8d7da;
                color: #721c24;
            }

            .product-actions {
                display: flex;
                align-items: center;
                gap: 20px;
                margin-bottom: 40px;
                flex-wrap: wrap;
            }

            .quantity-selector {
                display: flex;
                align-items: center;
                border: 1px solid #ddd;
                border-radius: 4px;
            }

            .qty-btn {
                background: #f8f9fa;
                border: none;
                width: 40px;
                height: 40px;
                cursor: pointer;
                font-size: 18px;
                transition: background 0.3s ease;
            }

            .qty-btn:hover {
                background: #e9ecef;
            }

            #productQty {
                width: 60px;
                height: 40px;
                text-align: center;
                border: none;
                border-left: 1px solid #ddd;
                border-right: 1px solid #ddd;
            }

            .add-to-cart-btn {
                padding: 15px 30px;
                font-size: 16px;
                font-weight: 500;
            }

            .add-to-cart-btn:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

            .wishlist-btn {
                padding: 15px 20px;
            }

            .wishlist-btn.active {
                background: #dc3545;
                color: white;
            }

            .product-share {
                border-top: 1px solid #eee;
                padding-top: 30px;
            }

            .product-share h3 {
                margin-bottom: 15px;
            }

            .share-buttons {
                display: flex;
                gap: 10px;
            }

            .share-btn {
                width: 40px;
                height: 40px;
                border: 1px solid #ddd;
                background: white;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                color: #666;
            }

            .share-btn:hover {
                border-color: #8B4513;
                color: #8B4513;
                transform: scale(1.1);
            }

            .related-products {
                border-top: 1px solid #eee;
                padding-top: 40px;
            }

            .related-products h2 {
                text-align: center;
                margin-bottom: 30px;
                font-size: 2rem;
            }

            .products-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .breadcrumb {
                background: #f8f9fa;
                padding: 15px 0;
                font-size: 14px;
            }

            .breadcrumb a {
                color: #8B4513;
                text-decoration: none;
            }

            .breadcrumb a:hover {
                text-decoration: underline;
            }

            @media (max-width: 768px) {
                .product-detail-content {
                    grid-template-columns: 1fr;
                }

                .product-images {
                    order: 1;
                }

                .product-info {
                    order: 2;
                }

                .product-actions {
                    flex-direction: column;
                    align-items: stretch;
                }

                .quantity-selector {
                    justify-content: center;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
