<div id="cartMini" class="cart-mini">
  <div class="cart-mini-header">
    <h3>Your Cart (<span id="cartCount">0</span>)</h3>
    <button id="closeCartMini" class="cart-mini-close" aria-label="Close cart">&times;</button>
  </div>
  <div id="cartMiniItems" class="cart-mini-items"></div>
  <div class="cart-mini-footer">
    <p>Subtotal: $<span id="cartMiniSubtotal">0.00</span></p>
    <button id="viewCartBtn" class="btn-secondary">View Cart</button>
    <button id="checkoutBtn" class="btn-primary">Checkout</button>
  </div>
</div>
<div id="cartOverlay" class="overlay"></div>
