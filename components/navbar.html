<nav class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <a href="../index.html">Mashallah Furniture</a>
    </div>
    <div class="nav-menu" id="navMenu">
      <a href="/Home">Home</a>
      <a href="/Shop">Shop</a>
      <a href="/Collections">Collections</a>
      <a href="/About">About</a>
      <a href="/Contact">Contact</a>
      <a href="/Offers">Offers</a>
      <a href="/Search"><i class="fas fa-search"></i> Search</a>
      <a href="/account"><i class="fas fa-user"></i> Account</a>
    </div>
    <div class="nav-icons">
      <button id="cartIconBtn" class="cart-icon-btn">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCountBadge" class="cart-count">0</span>
      </button>
      <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</nav>
<script>
  document.getElementById('mobileToggle')?.addEventListener('click', () => {
    document.getElementById('navMenu')?.classList.toggle('active');
  });
  document.getElementById('cartIconBtn')?.addEventListener('click', () => {
    const cartMini = document.getElementById('cartMini');
    const overlay = document.getElementById('cartOverlay');
    if (cartMini) cartMini.classList.add('open');
    if (overlay) overlay.classList.add('active');
  });

  // Update cart count badge dynamically
  window.addEventListener('cartUpdated', (e) => {
    const cart = e.detail.cart;
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    const badge = document.getElementById('cartCountBadge');
    if (badge) {
      badge.textContent = count;
      badge.style.display = count > 0 ? 'inline' : 'none';
    }
  });
</script>
