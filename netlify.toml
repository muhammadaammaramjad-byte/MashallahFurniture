# ============================================
# MASHAALLAHFURNITURE - NETLIFY CONFIGURATION
# Production-ready with optimizations
# ============================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# ============================================
# CORE REDIRECTS & REWRITES
# ============================================

# Admin section
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Clean URLs - Remove .html extension
[[redirects]]
  from = "/Home"
  to = "/Home/home.html"
  status = 301
  force = true

[[redirects]]
  from = "/Shop"
  to = "/Shop/shop.html"
  status = 301
  force = true

[[redirects]]
  from = "/Collections"
  to = "/Collections/collections.html"
  status = 301
  force = true

[[redirects]]
  from = "/Contact"
  to = "/Contact/contact.html"
  status = 301
  force = true

[[redirects]]
  from = "/Offers"
  to = "/Offers/offers.html"
  status = 301
  force = true

[[redirects]]
  from = "/Search"
  to = "/Search/search.html"
  status = 301
  force = true

[[redirects]]
  from = "/About"
  to = "/About/about.html"
  status = 301
  force = true

# Trailing slash handling
[[redirects]]
  from = "/Home/"
  to = "/Home/home.html"
  status = 301

[[redirects]]
  from = "/Shop/"
  to = "/Shop/shop.html"
  status = 301

[[redirects]]
  from = "/Collections/"
  to = "/Collections/collections.html"
  status = 301

[[redirects]]
  from = "/Contact/"
  to = "/Contact/contact.html"
  status = 301

[[redirects]]
  from = "/Offers/"
  to = "/Offers/offers.html"
  status = 301

[[redirects]]
  from = "/Search/"
  to = "/Search/search.html"
  status = 301

[[redirects]]
  from = "/About/"
  to = "/About/about.html"
  status = 301

[[redirects]]
  from = "/nav-btn/"
  to = "/nav-btn/cart.html"
  status = 301

# Cart shortcuts
[[redirects]]
  from = "/cart"
  to = "/nav-btn/cart.html"
  status = 301

[[redirects]]
  from = "/wishlist"
  to = "/nav-btn/favourite.html"
  status = 301

[[redirects]]
  from = "/account"
  to = "/nav-btn/Account/account.html"
  status = 301

# ============================================
# SECURITY HEADERS
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Content Security Policy (CSP) - Enhanced
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self' data:;
      connect-src 'self' https:;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    '''
    
    # Permissions Policy (formerly Feature-Policy)
    Permissions-Policy = '''
      geolocation=(),
      microphone=(),
      camera=(),
      payment=(self),
      usb=()
    '''
    
    # Cache Control for HTML
    Cache-Control = "no-cache, no-store, must-revalidate"
    
    # CORS (if needed for APIs)
    Access-Control-Allow-Origin = "https://mashallah-furniture.netlify.app"

# ============================================
# STATIC ASSETS CACHING (1 YEAR)
# ============================================

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# SHORT-TERM CACHING FOR HTML PAGES
# ============================================

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================
# PWA & SERVICE WORKER (NO CACHE)
# ============================================

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ============================================
# SEO & ROBOTS
# ============================================

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# ============================================
# DEPLOY NOTIFICATIONS
# ============================================

[notifications]
  slack = { webhook = "https://hooks.slack.com/services/YOUR/WEBHOOK/HERE" }
  email = "your-email@mashallahfurniture.com"

# ============================================
# FUNCTIONS (if using serverless)
# ============================================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

