[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/Home/"
  to = "/Home/home.html"
  status = 301

[[redirects]]
  from = "/Shop/"
  to = "/Shop/shop.html"
  status = 301

[[redirects]]
  from = "/Collections/"
  to = "/Collections/collections.html"
  status = 301

[[redirects]]
  from = "/Contact/"
  to = "/Contact/contact.html"
  status = 301

[[redirects]]
  from = "/Offers/"
  to = "/Offers/offers.html"
  status = 301

[[redirects]]
  from = "/Search/"
  to = "/Search/search.html"
  status = 301

[[redirects]]
  from = "/nav-btn/"
  to = "/nav-btn/cart.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
