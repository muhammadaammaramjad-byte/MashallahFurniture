<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | MashallahFurniture</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="Home/home.css">
  <style>
    .error-container {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .error-content {
      max-width: 600px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 900;
      color: var(--primary-black, #000);
      margin: 0;
      font-family: 'Playfair Display', serif;
      opacity: 0.1;
    }

    .error-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary-black, #000);
      margin: 1rem 0;
      font-family: 'Playfair Display', serif;
    }

    .error-message {
      font-size: 1.2rem;
      color: var(--text-gray, #666);
      margin: 1.5rem 0;
      line-height: 1.6;
      font-family: 'Inter', sans-serif;
    }

    .error-actions {
      margin-top: 2rem;
    }

    .btn-primary {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--primary-black, #000);
      color: var(--primary-white, #fff);
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      margin: 0 0.5rem;
    }

    .btn-primary:hover {
      background: var(--accent-gray, #333);
      transform: translateY(-2px);
    }

    .btn-secondary {
      display: inline-block;
      padding: 1rem 2rem;
      background: transparent;
      color: var(--primary-black, #000);
      text-decoration: none;
      border: 2px solid var(--primary-black, #000);
      border-radius: 0.5rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      margin: 0 0.5rem;
    }

    .btn-secondary:hover {
      background: var(--primary-black, #000);
      color: var(--primary-white, #fff);
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 6rem;
      }

      .error-title {
        font-size: 2rem;
      }

      .error-actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .btn-primary,
      .btn-secondary {
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <div data-include="components/navbar.html"></div>
  <div data-include="components/cart-mini.html"></div>
  <div data-include="components/toast.html"></div>

  <div id="readingProgress" class="reading-progress" aria-hidden="true"></div>

  <!-- Main Error Content -->
  <main class="error-container">
    <div class="error-content">
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved.
        Don't worry, let's get you back to browsing our beautiful furniture collection.
      </p>
      <div class="error-actions">
        <a href="Home/home.html" class="btn-primary">
          <i class="fas fa-home"></i> Go Home
        </a>
        <a href="Shop/shop.html" class="btn-secondary">
          <i class="fas fa-shopping-bag"></i> Shop Now
        </a>
      </div>
    </div>
  </main>

  <!-- Visual layers for consistency -->
  <div id="springCells" aria-hidden="true"></div>
  <div id="starLayer" aria-hidden="true"></div>
  <div id="binaryLayer" aria-hidden="true"></div>

  <!-- Cursor elements -->
  <div id="cursorCore" class="cursor-core" aria-hidden="true"></div>

  <div data-include="components/footer.html"></div>

  <script src="js/components.js"></script>
  <script src="js/toast.js"></script>
  <script src="Home/home.js"></script>
</body>

</html></content>
<parameter name="filePath"></parameter>
